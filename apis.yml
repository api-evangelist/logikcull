aid: logikcull
name: Logikcull
description: Cloud eDiscovery platform with a REST API for uploading case documents,
  managing review projects, applying tags and redactions, and generating production
  sets. Logikcull enables legal teams to process, review, and produce data in a self-service
  model with integrations for Slack, Microsoft 365, Google Workspace, Box, and Dropbox.
